<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Catch The Insect</title>
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="screen">
      <h1>Catch The Insect</h1>
      <button class="btn" id="start-btn">Play Game</button>
    </div>

    <div class="screen">
      <h1>What is your "favorite" insect?</h1>
      <ul class="insects-list">
        <li>
          <button class="choose-insect-btn">
            <p>Butterfly</p>
            <img src="http://pngimg.com/uploads/butterfly/butterfly_PNG12345.png" alt="butterfly">
          </button>
        </li>
        <li>
          <button class="choose-insect-btn">
            <p>Bee</p>
            <img
               src="http://pngimg.com/uploads/bee/bee_PNG123.png" alt="bee">
               alt="bee"
               />
          </button>
        </li>
        <li>
          <button class="choose-insect-btn">
            <p>Ladybug</p>
            <img
               src="http://pngimg.com/uploads/ladybug/ladybug_PNG12345.png" alt="ladybug">
               alt="ladybug"
               />
          </button>
        </li>
        <li>
          <button class="choose-insect-btn">
            <p>Dragonfly</p>
            <img
               src="http://pngimg.com/uploads/dragonfly/dragonfly_PNG12345.png" alt="dragonfly">
               alt="dragonfly"
               />
          </button>
        </li>
      </ul>
    </div>

    <div class="screen game-container" id="game-container">
      <h3 id="time" class="time">Time: 00:00</h3>
      <h3 id="score" class="score">Score: 0</h3>
      <h5 id="message" class="message">
        Are you annoyed yet? <br>
        You are playing an impossible game!
      </h5>
    </div>
  </body>
</html>
